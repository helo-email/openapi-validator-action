name: "verify action using sample schema"
on:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: run tests
        run: npm install && npm run test
      - name: openapi-github-action
        uses: ./
        with:
          filepath: './schemas/openapiv3.yml'